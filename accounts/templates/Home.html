{% extends 'base.html' %}

{% block title %}DiegoClean{% endblock %}

<head>
    {% load static %}
    <title>Lista de Clientes</title>
<style>
     .button {
        allign-items: center;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background-color: #2ecc71;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
     }
</style>
</head>
<body>
       <input type="button" value="Cadastrar Serviço">
    <h2>Clientes</h2>
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
        </tr>

        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.serviço }}</td>
            <td>{{ cliente.data }}</td>
            <td>{{ cliente.valor }}</td>
            <td>{{ cliente.status }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
