<!DOCTYPE html>
<html>
<head>
    <title>Lista de Clientes</title>
</head>
<body>
    <h1>Clientes</h1>

    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
        </tr>

        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.email }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
