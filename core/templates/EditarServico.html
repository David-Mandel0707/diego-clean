{% extends 'base.html' %}

{% block title %}Editar Serviço — DiegoClean{% endblock %}

{% block content %}
<style>
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .back-link:hover { color: var(--primary); }

  .campo { margin-bottom: 20px; }

  .campo label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .campo input,
  .campo select,
  .campo textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .18s;
    resize: none;
    appearance: none;
  }

  .campo input:focus,
  .campo select:focus,
  .campo textarea:focus { border-color: var(--primary); }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '\f078';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 12px;
  }

  .btn-salvar {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background .18s, transform .1s;
    margin-top: 8px;
  }

  .btn-salvar:hover  { background: var(--primary-dark); }
  .btn-salvar:active { transform: scale(0.98); }
</style>

<a href="{% url 'cliente_detalhe' servico.cliente.pk %}" class="back-link">
  <i class="fa-solid fa-chevron-left"></i> {{ servico.cliente.nome }}
</a>

<div class="section-title" style="margin-bottom:20px;">Editar Serviço</div>

<div class="card">
  <form method="POST">
    {% csrf_token %}

    <div class="campo">
      <label for="cliente">Cliente *</label>
      <div class="select-wrapper">
        <select id="cliente" name="cliente" required>
          {% for c in clientes %}
          <option value="{{ c.pk }}" {% if c.pk == servico.cliente.pk %}selected{% endif %}>
            {{ c.nome }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="campo">
      <label for="data">Data *</label>
      <input type="date" id="data" name="data" value="{{ servico.data|date:'Y-m-d' }}" required>
    </div>

    <div class="campo">
      <label for="valor">Valor (R$) *</label>
      <input type="number" id="valor" name="valor" step="0.01" min="0" value="{{ servico.valor }}" required>
    </div>

    <div class="campo">
      <label for="status_pagamento">Status *</label>
      <div class="select-wrapper">
        <select id="status_pagamento" name="status_pagamento" required>
          <option value="pendente" {% if servico.status_pagamento == 'pendente' %}selected{% endif %}>Pendente</option>
          <option value="pago" {% if servico.status_pagamento == 'pago' %}selected{% endif %}>Pago</option>
          <option value="cancelado" {% if servico.status_pagamento == 'cancelado' %}selected{% endif %}>Cancelado</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label for="descricao">Descrição</label>
      <textarea id="descricao" name="descricao" rows="3">{{ servico.descricao }}</textarea>
    </div>

    <button type="submit" class="btn-salvar">Salvar alterações</button>
  </form>
</div>

{% endblock %}
