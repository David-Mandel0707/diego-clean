{% extends 'base.html' %}

{% block title %}Clientes — DiegoClean{% endblock %}

{% block content %}
<style>
  .cliente-item {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: inherit;
    transition: border-color .18s;
  }

  .cliente-item:hover { border-color: var(--primary); }

  .cliente-nome {
    font-weight: 600;
    font-size: 15px;
  }

  .cliente-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .cliente-arrow {
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 40px 0;
  }
</style>

<div class="section-header">
  <span class="section-title">Clientes</span>
  <a href="{% url 'novo_cliente' %}" class="btn-primary">
    <i class="fa-solid fa-plus"></i> Novo
  </a>
</div>

{% for cliente in clientes %}
<a href="{% url 'cliente_detalhe' cliente.pk %}" class="cliente-item">
  <div>
    <div class="cliente-nome">{{ cliente.nome }}</div>
    <div class="cliente-meta">
      {% if cliente.telefone %}<i class="fa-solid fa-phone" style="font-size:11px;"></i> {{ cliente.telefone }}{% endif %}
    </div>
  </div>
  <i class="fa-solid fa-chevron-right cliente-arrow"></i>
</a>
{% empty %}
<div class="empty">Nenhum cliente cadastrado ainda.</div>
{% endfor %}

{% endblock %}
